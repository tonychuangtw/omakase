<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🍣 訂位監控</title>
<meta name="theme-color" content="#0d0d10">
<style>
  :root {
    --bg: #0d0d10; --card: #17171c; --border: #2a2a33; --text: #ececf1;
    --text2: #9a9aa8; --accent: #e0a458; --ok: #4cc38a; --bad: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 16px 60px; background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    line-height: 1.6; max-width: 640px; margin-inline: auto;
  }
  h1 { font-size: 1.4rem; margin: 24px 0 4px; }
  .sub { color: var(--text2); font-size: 0.9rem; margin: 0 0 20px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin: 14px 0;
  }
  label { display: block; font-size: 0.9rem; color: var(--text2); margin: 12px 0 4px; }
  input, select {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 1rem;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  input[type="date"] { color-scheme: dark; }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  button {
    border: none; border-radius: 10px; padding: 12px 20px; font-size: 1rem;
    cursor: pointer; font-weight: 600;
  }
  .primary { background: var(--accent); color: #1c1206; width: 100%; margin-top: 16px; }
  .primary:disabled { opacity: 0.5; }
  .del {
    background: transparent; color: var(--bad); border: 1px solid var(--border);
    padding: 6px 12px; font-size: 0.85rem;
  }
  .pause {
    background: transparent; color: var(--text2); border: 1px solid var(--border);
    padding: 6px 12px; font-size: 0.85rem;
  }
  .btn-row { display: flex; gap: 6px; flex-shrink: 0; }
  .ghost {
    background: transparent; color: var(--accent); border: 1px solid var(--accent);
    padding: 8px 14px; font-size: 0.88rem;
  }
  .avail { color: var(--ok); font-size: 0.9rem; margin-top: 4px; }
  details.hist { margin-top: 6px; }
  details.hist summary { cursor: pointer; color: var(--text2); font-size: 0.85rem; }
  .hist-row { font-size: 0.82rem; color: var(--text2); padding: 2px 0 2px 12px; }
  .badge.paused { color: var(--text2); border-color: var(--border); }
  .entry { border-bottom: 1px solid var(--border); padding: 12px 0; }
  .entry:last-child { border-bottom: none; }
  .entry-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .entry-name { font-weight: 700; font-size: 1.05rem; }
  .entry-meta { color: var(--text2); font-size: 0.88rem; margin-top: 2px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 99px;
    font-size: 0.78rem; border: 1px solid var(--border); color: var(--text2);
  }
  .badge.available { background: var(--ok); color: #06281a; border: none; font-weight: 700; }
  .badge.watching { color: var(--accent); border-color: var(--accent); }
  .badge.not_found { color: var(--bad); border-color: var(--bad); }
  .msg { font-size: 0.9rem; color: var(--text2); min-height: 1.4em; margin-top: 8px; }
  .msg.err { color: var(--bad); }
  .hidden { display: none; }
  a { color: var(--accent); }
  .hero {
    width: calc(100% + 32px); margin: 0 -16px; display: block;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>
<img class="hero" src="banner.jpg" alt="omakase 壽司吧檯插畫">
<h1>🍣 訂位監控</h1>
<p class="sub">omakase.in 空位監看 — 填表新增，claudebot500 每 10 分鐘查一次，有位子推播通知</p>

<div id="signin-card" class="card">
  <p>用 Google 登入後管理監控清單（僅限 Tony 本人帳號）</p>
  <div id="gsi-btn"></div>
</div>

<div id="app" class="hidden">
  <div class="card">
    <h2 style="font-size:1.1rem;margin:0 0 4px;">➕ 新增監控</h2>
    <label for="f-name">餐廳名</label>
    <input id="f-name" placeholder="例：酉囃子" maxlength="100">
    <label for="f-date">日期（可留空 = 任何日期）</label>
    <input id="f-date" type="date">
    <div class="row2">
      <div>
        <label for="f-meal">時段</label>
        <select id="f-meal">
          <option value="any">午晚皆可</option>
          <option value="lunch">午餐</option>
          <option value="dinner" selected>晚餐</option>
        </select>
      </div>
      <div>
        <label for="f-days">平日/週末</label>
        <select id="f-days">
          <option value="any">皆可</option>
          <option value="weekday">平日</option>
          <option value="weekend">週末</option>
        </select>
      </div>
    </div>
    <label for="f-party">人數</label>
    <input id="f-party" type="number" min="1" max="20" value="2">
    <button id="f-submit" class="primary">送出</button>
    <p id="f-msg" class="msg"></p>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin:0 0 8px;">
      <h2 style="font-size:1.1rem;margin:0;">📋 目前監控中</h2>
      <button id="test-push" class="ghost">🔔 測試推播</button>
    </div>
    <p id="push-msg" class="msg" style="margin:0 0 4px;"></p>
    <div id="list"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
(function () {
  "use strict";
  var CLIENT_ID = "481860179039-gb37qsdogd4vgnn2g5umh73jen02avj4.apps.googleusercontent.com";
  var API = "https://claudebot500.tailfcf67f.ts.net";
  var TOKEN_KEY = "omakase.token";
  var STATUS_LABEL = {
    pending: "等待首查", watching: "監看中", available: "🎉 有位子！", not_found: "找不到店"
  };
  var MEAL_LABEL = { any: "午晚皆可", lunch: "午餐", dinner: "晚餐" };
  var DAYS_LABEL = { any: "平假日皆可", weekday: "平日", weekend: "週末" };

  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function token() {
    try { return sessionStorage.getItem(TOKEN_KEY); } catch (e) { return null; }
  }

  function api(method, path, body, cb) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, API + path);
    xhr.setRequestHeader("Authorization", "Bearer " + token());
    if (body) xhr.setRequestHeader("Content-Type", "application/json");
    xhr.timeout = 20000;
    xhr.onload = function () {
      var data = null;
      try { data = JSON.parse(xhr.responseText); } catch (e) {}
      if (xhr.status === 401) { signOut(); return; }
      cb(xhr.status >= 200 && xhr.status < 300 ? null : ((data && data.error) || ("HTTP " + xhr.status)), data);
    };
    xhr.onerror = function () { cb("連線失敗（500 主機可能離線）"); };
    xhr.ontimeout = function () { cb("連線逾時"); };
    xhr.send(body ? JSON.stringify(body) : null);
  }

  function fmtDate(ms) {
    if (!ms) return "—";
    var d = new Date(ms);
    return (d.getMonth() + 1) + "/" + d.getDate() + " " +
      d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
  }

  function renderList(restaurants) {
    var el = $("list");
    if (!restaurants || !restaurants.length) {
      el.innerHTML = '<p class="msg">還沒有監控項目，用上面的表單新增。</p>';
      return;
    }
    el.innerHTML = "";
    restaurants.forEach(function (r) {
      var div = document.createElement("div");
      div.className = "entry";
      var paused = r.active === false;
      var st = paused ? "⏸ 暫停中" : (STATUS_LABEL[r.status] || r.status || "—");
      var badgeCls = paused ? "paused" : esc(r.status || "");
      var prefs = esc(r.date || "任何日期") +
        (r.meal && r.meal !== "any" ? " · " + MEAL_LABEL[r.meal] : "") +
        (r.days && r.days !== "any" ? " · " + DAYS_LABEL[r.days] : "");
      var availHtml = "";
      if (r.status === "available" && r.availability && r.availability.length) {
        availHtml = '<div class="avail">可訂：' + r.availability.map(esc).join("、") + "</div>";
      }
      var histHtml = "";
      if (r.history && r.history.length) {
        histHtml = '<details class="hist"><summary>查核紀錄（' + r.history.length + '）</summary>' +
          r.history.slice().reverse().map(function (h) {
            return '<div class="hist-row">' + fmtDate(h.t) + " — " + esc(STATUS_LABEL[h.status] || h.status || "") +
              (h.note ? "：" + esc(h.note) : "") + "</div>";
          }).join("") + "</details>";
      }
      div.innerHTML =
        '<div class="entry-head"><div>' +
        '<div class="entry-name">' + esc(r.name) + ' <span class="badge ' + badgeCls + '">' + esc(st) + "</span></div>" +
        '<div class="entry-meta">' + prefs + " · " + r.party + " 人 · 加入 " + fmtDate(r.added) +
        " · 上次查核 " + fmtDate(r.lastChecked) +
        (r.url ? ' · <a href="' + esc(r.url) + '" target="_blank" rel="noopener">訂位頁</a>' : "") +
        (r.note ? "<br>" + esc(r.note) : "") +
        "</div>" + availHtml + histHtml + "</div>" +
        '<div class="btn-row">' +
        '<button class="pause">' + (paused ? "▶ 恢復" : "⏸ 暫停") + "</button>" +
        '<button class="del">刪除</button></div></div>';
      div.querySelector(".pause").addEventListener("click", function () {
        api("PATCH", "/api/omakase/watch/" + encodeURIComponent(r.id), { active: paused }, function (err, data) {
          if (err) { alert("更新失敗：" + err); return; }
          renderList(data.restaurants);
        });
      });
      div.querySelector(".del").addEventListener("click", function () {
        if (!confirm("停止監控「" + r.name + "」？")) return;
        api("DELETE", "/api/omakase/watch/" + encodeURIComponent(r.id), null, function (err, data) {
          if (err) { alert("刪除失敗：" + err); return; }
          renderList(data.restaurants);
        });
      });
      el.appendChild(div);
    });
  }

  function refresh() {
    api("GET", "/api/omakase/watch", null, function (err, data) {
      if (err) { $("list").innerHTML = '<p class="msg err">載入失敗：' + esc(err) + "</p>"; return; }
      renderList(data.restaurants);
    });
  }

  function submitForm() {
    var name = $("f-name").value.trim();
    var party = parseInt($("f-party").value, 10);
    var msg = $("f-msg");
    if (!name) { msg.textContent = "請填餐廳名"; msg.className = "msg err"; return; }
    if (!party || party < 1 || party > 20) { msg.textContent = "人數要 1–20"; msg.className = "msg err"; return; }
    var btn = $("f-submit");
    btn.disabled = true;
    msg.textContent = "送出中…"; msg.className = "msg";
    api("POST", "/api/omakase/watch", {
      name: name, date: $("f-date").value, party: party,
      meal: $("f-meal").value, days: $("f-days").value
    }, function (err, data) {
      btn.disabled = false;
      if (err) { msg.textContent = "失敗：" + err; msg.className = "msg err"; return; }
      msg.textContent = "✅ 已加入「" + name + "」— claudebot500 下一輪就會開始查";
      msg.className = "msg";
      $("f-name").value = ""; $("f-date").value = "";
      renderList(data.restaurants);
    });
  }

  function showApp() {
    $("signin-card").classList.add("hidden");
    $("app").classList.remove("hidden");
    refresh();
  }
  function signOut() {
    try { sessionStorage.removeItem(TOKEN_KEY); } catch (e) {}
    $("app").classList.add("hidden");
    $("signin-card").classList.remove("hidden");
  }

  window.addEventListener("load", function () {
    function initGsi() {
      if (!window.google || !google.accounts) { setTimeout(initGsi, 200); return; }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: function (resp) {
          try { sessionStorage.setItem(TOKEN_KEY, resp.credential); } catch (e) {}
          showApp();
        }
      });
      google.accounts.id.renderButton($("gsi-btn"), { theme: "filled_black", size: "large", text: "signin_with" });
    }
    initGsi();
    if (token()) showApp();
    $("f-submit").addEventListener("click", submitForm);
    $("test-push").addEventListener("click", function () {
      var m = $("push-msg");
      m.textContent = "發送中…"; m.className = "msg";
      api("POST", "/api/omakase/test-push", {}, function (err) {
        if (err) { m.textContent = "推播失敗：" + err; m.className = "msg err"; return; }
        m.textContent = "✅ 已發送，看看 claudebot500 的 Telegram";
      });
    });
  });
})();
</script>
</body>
</html>
